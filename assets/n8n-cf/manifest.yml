---
applications:
  - name: tank-reconciliation-n8n
    path: .
    memory: 512M
    disk_quota: 2G
    instances: 1
    random-route: true
    buildpacks:
      - nodejs_buildpack
    command: npm start
    health-check-type: http
    health-check-http-endpoint: /healthz
    timeout: 180
    env:
      NODE_ENV: production
      N8N_PORT: "8080"
      N8N_PROTOCOL: https
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: admin
      DB_TYPE: sqlite
      DB_SQLITE_DATABASE: /tmp/n8n.db
      N8N_USER_FOLDER: /tmp/n8n
      EXECUTIONS_DATA_SAVE_ON_ERROR: all
      EXECUTIONS_DATA_SAVE_ON_SUCCESS: none
      EXECUTIONS_DATA_SAVE_MANUAL_EXECUTIONS: "true"
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_VERSION_NOTIFICATIONS_ENABLED: "false"
      N8N_TEMPLATES_ENABLED: "false"
      N8N_LOG_LEVEL: warn
      # Set these via: cf set-env tank-reconciliation-n8n N8N_BASIC_AUTH_PASSWORD <your-password>
      # And: cf set-env tank-reconciliation-n8n N8N_WEBHOOK_URL <your-n8n-url>
