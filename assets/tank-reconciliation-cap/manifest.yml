---
# Cloud Foundry deployment manifest for the Tank Reconciliation CAP backend.
# Uses SQLite (in-memory) for this CF space — no HANA HDI service available.
# Deployed via: cf push (from assets/tank-reconciliation-cap/)
applications:
  - name: tank-reconciliation-cap-srv
    path: gen/srv
    memory: 256M
    disk_quota: 1G
    instances: 1
    buildpacks:
      - nodejs_buildpack
    command: node node_modules/@sap/cds/bin/serve.js all --production
    health-check-type: process
    timeout: 120
    services:
      - tank-reconciliation-xsuaa
      - tank-reconciliation-destination
    env:
      NODE_ENV: production
      CDS_ENV: production
      S4HANA_DESTINATION_NAME: S4HANA_PUBLIC_CLOUD
      AICORE_DESTINATION_NAME: aicore
