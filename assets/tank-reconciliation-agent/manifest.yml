---
# CF manifest for Tank Reconciliation Agent
# Deployed to Cloud Foundry via: cf push (from assets/tank-reconciliation-agent/)
applications:
  - name: tank-reconciliation-agent
    memory: 512M
    disk_quota: 1G
    instances: 1
    buildpacks:
      - python_buildpack
    command: gunicorn --worker-class uvicorn.workers.UvicornWorker --workers 2 --bind 0.0.0.0:${PORT} --chdir app main:application
    timeout: 180
    health-check-type: http
    health-check-http-endpoint: /.well-known/agent.json
    services:
      - proj-vector-destination-service
    env:
      AICORE_DESTINATION_NAME: aicore
      LOG_LEVEL: INFO
      AGENT_LLM_MODEL: gpt-4o
